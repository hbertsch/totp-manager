name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-arm64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: clippy, rustfmt

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-tauri
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build (macOS)
        if: startsWith(matrix.platform, 'macos')
        run: cargo tauri build --ci --target ${{ matrix.target }}

      - name: Sign and repackage macOS app
        if: startsWith(matrix.platform, 'macos')
        run: |
          APP="src-tauri/target/${{ matrix.target }}/release/bundle/macos/TOTP Manager.app"
          DMG=$(ls src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg)

          # Tauri's --ci mode skips bundle signing, leaving only the linker
          # signature. This makes Gatekeeper report the app as "damaged".
          # A proper ad-hoc codesign seals the bundle resources and Info.plist.
          codesign --force --deep -s - "$APP"
          codesign --verify --deep --strict "$APP"

          # Recreate the DMG with the properly signed app
          rm "$DMG"
          hdiutil create -volname "TOTP Manager" -srcfolder "$APP" -ov -format UDZO "$DMG"

          # Recreate the .app.tar.gz with the properly signed app
          TARGZ=$(ls src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz 2>/dev/null || true)
          if [ -n "$TARGZ" ]; then
            rm "$TARGZ"
            tar -czf "$TARGZ" -C "$(dirname "$APP")" "$(basename "$APP")"
          fi

      - name: Build (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: cargo tauri build --ci --target ${{ matrix.target }}

      - name: Build (Windows)
        if: matrix.platform == 'windows-latest'
        run: cargo tauri build --ci --target ${{ matrix.target }} --no-sign

      - name: Upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
