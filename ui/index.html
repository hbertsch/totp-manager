<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TOTP Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Toolbar -->
  <div class="toolbar">
    <h1>TOTP Manager</h1>
    <input id="search" autofocus type="text" placeholder="search for ID here...">
    <input id="file-input" type="file" accept=".json">
    <button class="load" id="load-btn"><h2>Load JSON</h2></button>
  </div>

  <!-- Content -->
  <div class="content" role="main">
    <table style="width:100%">
      <tr>
        <th id="sort-col" class="thcontainer"><h2>⮃ ID</h2></th>
        <th><h2>Code</h2></th>
        <th><h2>Validity (s)</h2></th>
      </tr>
      <tbody id="table-body"></tbody>
    </table>
  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="terminal">
      <pre id="status">Click on a code to copy it to your clipboard...</pre>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
