<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TOTP Manager</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
      font-size: 10px;
      color: #333;
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      margin: 0;
    }

    h1 {
      color: rgb(245, 245, 245);
      padding-left: 1rem;
      padding-right: 1rem;
      width: 200px;
      white-space: nowrap;
    }

    input {
      padding-left: 0.5rem;
      border-radius: 6px;
      height: 1.5rem;
      font-size: 14px;
      width: 100%;
      max-width: 990px;
    }

    .card-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 8px;
    }

    .card-container .card:not(.highlight-card):hover {
      cursor: pointer;
      transform: translateY(-4px);
      box-shadow: 0 4px 17px rgba(0, 0, 0, 0.35);
      background-color: #1976d2;
      color: white;
      fill: white;
    }

    .card-container .card:not(.highlight-card):active {
      background-color: #ffffff;
      color: black;
      fill: black;
    }

    .card {
      all: unset;
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      justify-content: center;
      align-items: center;
      border-radius: 6px;
      background-color: #b8dcff;
      height: 0rem;
      width: 110px;
      padding: 1rem;
      transition: all 0.1s ease-in-out;
      cursor: pointer;
    }

    .load {
      all: unset;
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      justify-content: center;
      align-items: center;
      border-radius: 6px;
      background-color: #b8dcff;
      height: 0rem;
      width: 150px;
      padding: 1rem;
      margin-right: 1rem;
      margin-left: 1rem;
      transition: all 0.1s ease-in-out;
      cursor: pointer;
      white-space: nowrap;
    }

    .load:hover {
      background-color: #ffffff;
      color: black;
      fill: black;
    }

    .load:active {
      background-color: #1976d2;
      color: white;
      fill: white;
    }

    .toolbar {
      position: fixed;
      top: 0;
      left: 0;
      height: 5rem;
      width: 100%;
      background-color: #1976d2;
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      justify-content: space-between;
      align-items: center;
    }

    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      height: 7rem;
      width: 100%;
      background-color: #1976d2;
      display: flex;
      gap: 1rem;
      flex-direction: row;
      flex-wrap: nowrap;
      justify-content: center;
      align-items: center;
    }

    .terminal {
      position: relative;
      width: 100%;
      max-width: 600px;
      border-radius: 6px;
      padding-top: 3rem;
      overflow: hidden;
      background-color: rgb(15, 15, 16);
    }

    .terminal::before {
      content: "\2022 \2022 \2022";
      position: absolute;
      top: 0;
      left: 0;
      height: 4px;
      background: rgb(58, 58, 58);
      color: #c2c3c4;
      width: 100%;
      font-size: 2rem;
      line-height: 0;
      padding: 1rem 0;
      text-indent: 4px;
    }

    .terminal pre {
      font-family: SFMono-Regular, Consolas, Liberation Mono, Menlo, monospace;
      color: white;
      padding-bottom: 1rem;
      padding-left: 1rem;
      padding-right: 1rem;
      margin: 0;
      font-size: 14px;
    }

    .content {
      width: 100%;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      margin-bottom: 9rem;
      margin-top: 6rem;
    }

    th {
      text-align: left;
      background-color: #eceff1;
      border-radius: 6px;
      padding-left: 1rem;
      padding-right: 1rem;
    }

    td {
      border-bottom: 3px solid rgb(227, 227, 227);
    }

    .thcontainer {
      text-align: left;
      background-color: #eceff1;
      border-radius: 6px;
      padding-left: 1rem;
      padding-right: 1rem;
      cursor: pointer;
      transition: 0.1s;
    }

    .thcontainer:hover {
      background-color: #babec1;
    }

    .thcontainer:active {
      background-color: #b8dcff;
    }

    svg {
      margin-left: 0.8rem;
      height: 1.8rem;
      width: auto;
    }

    #file-input {
      display: none !important;
      position: absolute;
      visibility: hidden;
      width: 0;
      height: 0;
      overflow: hidden;
    }
  </style>
</head>
<body>

  <!-- Toolbar -->
  <div class="toolbar">
    <h1>TOTP Manager</h1>
    <input id="search" autofocus type="text" placeholder="search for ID here...">
    <input id="file-input" type="file" accept=".json">
    <button class="load" id="load-btn"><h2>Load JSON</h2></button>
  </div>

  <!-- Content -->
  <div class="content" role="main">
    <table style="width:100%">
      <tr>
        <th id="sort-col" class="thcontainer"><h2>⮃ ID</h2></th>
        <th><h2>Code</h2></th>
        <th><h2>Validity (s)</h2></th>
      </tr>
      <tbody id="table-body"></tbody>
    </table>
  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="terminal">
      <pre id="status">Click on a code to copy it to your clipboard...</pre>
    </div>
  </div>

  <script type="module">
    // ── TOTP generation (Web Crypto API) ──────────────────────────────
    const BASE32_CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';

    function base32Decode(input) {
      input = input.toUpperCase().replace(/=+$/, '');
      let bits = 0, value = 0;
      const output = [];
      for (const char of input) {
        const idx = BASE32_CHARS.indexOf(char);
        if (idx === -1) continue;
        value = (value << 5) | idx;
        bits += 5;
        if (bits >= 8) { bits -= 8; output.push((value >> bits) & 0xff); }
      }
      return new Uint8Array(output);
    }

    async function generateTOTP(base32Secret) {
      const keyBytes = base32Decode(base32Secret);
      const timeStep = Math.floor(Date.now() / 1000 / 30);
      const timeBuffer = new ArrayBuffer(8);
      new DataView(timeBuffer).setUint32(4, timeStep, false);
      const cryptoKey = await crypto.subtle.importKey(
        'raw', keyBytes, { name: 'HMAC', hash: 'SHA-1' }, false, ['sign']
      );
      const sig = new Uint8Array(await crypto.subtle.sign('HMAC', cryptoKey, timeBuffer));
      const offset = sig[19] & 0xf;
      const code = ((sig[offset] & 0x7f) << 24) | ((sig[offset+1] & 0xff) << 16) |
                   ((sig[offset+2] & 0xff) << 8)  |  (sig[offset+3] & 0xff);
      return String(code % 1_000_000).padStart(6, '0');
    }

    // ── Validity countdown (exact formula from app.component.ts:108) ──
    function validitySeconds() {
      const t = Date.now();
      return Math.floor(30 - ((t / 1000) - 30) % 30);
    }

    // ── State ─────────────────────────────────────────────────────────
    let secrets   = [];   // [{key, label}]
    let codes     = [];   // [{label, code, validTime}]
    let query     = '';
    let sortOrder = 'asc';

    // ── Persistence ───────────────────────────────────────────────────
    function loadConfig() {
      const raw = localStorage.getItem('totp-cfg');
      return raw ? JSON.parse(raw) : [];
    }
    function saveConfig(jsonString) {
      localStorage.setItem('totp-cfg', jsonString);
    }

    // ── Code generation ───────────────────────────────────────────────
    async function generateCodes() {
      const validTime = validitySeconds();
      codes = await Promise.all(
        secrets.map(async s => ({
          label: s.label,
          code: await generateTOTP(s.key),
          validTime
        }))
      );
    }

    // ── Sort ──────────────────────────────────────────────────────────
    function sortSecrets() {
      secrets.sort((a, b) => {
        const cmp = a.label.localeCompare(b.label);
        return sortOrder === 'asc' ? cmp : -cmp;
      });
    }

    // ── Helpers ───────────────────────────────────────────────────────
    function escHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    function escAttr(s) {
      return s.replace(/"/g, '&quot;');
    }

    // ── Render ────────────────────────────────────────────────────────
    const COPY_ICON = `<svg class="material-icons" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M17.391,2.406H7.266c-0.232,0-0.422,0.19-0.422,0.422v3.797H3.047c-0.232,0-0.422,0.19-0.422,0.422v10.125c0,0.232,0.19,0.422,0.422,0.422h10.125c0.231,0,0.422-0.189,0.422-0.422v-3.797h3.797c0.232,0,0.422-0.19,0.422-0.422V2.828C17.812,2.596,17.623,2.406,17.391,2.406 M12.749,16.75h-9.28V7.469h3.375v5.484c0,0.231,0.19,0.422,0.422,0.422h5.483V16.75zM16.969,12.531H7.688V3.25h9.281V12.531z"/></svg>`;

    function render() {
      const filtered = codes.filter(c =>
        c.label.toLowerCase().includes(query.toLowerCase())
      );
      document.getElementById('table-body').innerHTML = filtered.map(c => `
        <tr>
          <td style="max-width:60%"><h2>${escHtml(c.label)}</h2></td>
          <td style="max-width:20%">
            <div class="card-container">
              <button class="card" data-code="${escAttr(c.code)}">
                <span><h2>${escHtml(c.code)}</h2></span>${COPY_ICON}
              </button>
            </div>
          </td>
          <td style="max-width:20%;text-align:center"><h2>${c.validTime}</h2></td>
        </tr>`).join('');
    }

    // ── Bootstrap ─────────────────────────────────────────────────────
    async function init() {
      secrets = loadConfig();
      sortSecrets();
      await generateCodes();
      render();

      setInterval(async () => {
        await generateCodes();
        render();
      }, 1000);
    }

    // ── Event listeners ───────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', async () => {
      await init();

      // Search
      document.getElementById('search').addEventListener('input', e => {
        query = e.target.value;
        render();
      });

      // Sort
      document.getElementById('sort-col').addEventListener('click', () => {
        sortOrder = sortOrder === 'asc' ? 'des' : 'asc';
        sortSecrets();
        render();
      });

      // Clipboard (event delegation on tbody)
      document.getElementById('table-body').addEventListener('click', e => {
        const btn = e.target.closest('[data-code]');
        if (!btn) return;
        const code = btn.dataset.code;
        navigator.clipboard.writeText(code);
        document.getElementById('status').textContent = `Copied code ${code} to clipboard`;
      });

      // File load
      document.getElementById('load-btn').addEventListener('click', () => {
        document.getElementById('file-input').click();
      });
      document.getElementById('file-input').addEventListener('change', e => {
        const file = e.target.files[0];
        if (!file || file.type !== 'application/json') return;
        const reader = new FileReader();
        reader.onload = async ev => {
          saveConfig(ev.target.result);
          secrets = loadConfig();
          sortSecrets();
          await generateCodes();
          render();
        };
        reader.readAsText(file);
      });
    });
  </script>
</body>
</html>
